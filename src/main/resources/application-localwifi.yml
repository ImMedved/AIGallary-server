spring:
  datasource:
    url: jdbc:h2:file:./storage/localwifi-db/smart-gallery;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

app:
  storage:
    provider: filesystem
    filesystem:
      root: ./storage/localwifi-files

  analysis:
    enabled: false
    processing:
      scheduling-enabled: false

management:
  endpoint:
    health:
      show-details: never
