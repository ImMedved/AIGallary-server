services:

  postgres:
    image: postgres:16
    container_name: photo-postgres
    restart: unless-stopped
    networks:
      - gallery-backend
    environment:
      POSTGRES_DB: photo_cloud
      POSTGRES_USER: photo_user
      POSTGRES_PASSWORD: photo_password
    volumes:
      - postgres_data_v3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photo_user -d photo_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: photo-minio
    restart: unless-stopped
    networks:
      - gallery-backend
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_v3:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  analysis:
    build:
      context: ./analysis-service
      args:
        INSTALL_ML: "true"
    container_name: photo-analysis
    restart: unless-stopped
    networks:
      - gallery-backend
    mem_limit: ${ANALYSIS_CONTAINER_MEMORY_LIMIT:-5g}
    memswap_limit: ${ANALYSIS_CONTAINER_MEMORY_LIMIT:-5g}
    environment:
      ANALYSIS_PROVIDER: ${ANALYSIS_PROVIDER:-local_ml}
      ANALYSIS_MODE: ${ANALYSIS_MODE:-quality}
      ANALYSIS_EXECUTOR: ${ANALYSIS_EXECUTOR:-process}
      ANALYSIS_RAM_PROFILE: ${ANALYSIS_RAM_PROFILE:-test}
      ANALYSIS_MEMORY_LIMIT_GB: ${ANALYSIS_MEMORY_LIMIT_GB:-5}
      ANALYSIS_WORKERS: ${ANALYSIS_WORKERS:-1}
      ANALYSIS_ENRICHMENT_WORKERS: ${ANALYSIS_ENRICHMENT_WORKERS:-1}
      ANALYSIS_INTRAOP_THREADS: ${ANALYSIS_INTRAOP_THREADS:-4}
      ANALYSIS_MAX_PENDING_REQUESTS: ${ANALYSIS_MAX_PENDING_REQUESTS:-2}
      ANALYSIS_MAX_PENDING_FAST_REQUESTS: ${ANALYSIS_MAX_PENDING_FAST_REQUESTS:-2}
      ANALYSIS_MAX_PENDING_ENRICHMENT_REQUESTS: ${ANALYSIS_MAX_PENDING_ENRICHMENT_REQUESTS:-1}
      ANALYSIS_RESULT_CACHE_MB: ${ANALYSIS_RESULT_CACHE_MB:-512}
      ANALYSIS_FAST_TIMEOUT_SECONDS: ${ANALYSIS_FAST_TIMEOUT_SECONDS:-30}
      ANALYSIS_QUEUE_RETRY_AFTER_SECONDS: ${ANALYSIS_QUEUE_RETRY_AFTER_SECONDS:-15}
      ANALYSIS_PRELOAD_ON_STARTUP: ${ANALYSIS_PRELOAD_ON_STARTUP:-true}
      ANALYSIS_WARMUP_TIMEOUT_SECONDS: ${ANALYSIS_WARMUP_TIMEOUT_SECONDS:-300}
      ANALYSIS_LOG_MODE: ${ANALYSIS_LOG_MODE:-production}
      ANALYSIS_ALLOW_MODEL_DOWNLOAD: ${ANALYSIS_ALLOW_MODEL_DOWNLOAD:-true}
      LOG_LEVEL: ${ANALYSIS_LOG_LEVEL:-WARNING}

      ENABLE_YOLO: ${ENABLE_YOLO:-true}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8s.pt}
      YOLO_CONFIDENCE: ${YOLO_CONFIDENCE:-0.22}
      YOLO_IMAGE_SIZE: ${YOLO_IMAGE_SIZE:-768}
      YOLO_RUN_ON_TEXT_IMAGES: ${YOLO_RUN_ON_TEXT_IMAGES:-false}

      OCR_ENGINE: ${OCR_ENGINE:-easyocr}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-ru,en}
      OCR_POLICY: ${OCR_POLICY:-auto}
      OCR_MAX_SIDE: ${OCR_MAX_SIDE:-2200}
      OCR_BLOCK_MIN_CONFIDENCE: ${OCR_BLOCK_MIN_CONFIDENCE:-0.42}
      PADDLE_OCR_LANG: ${PADDLE_OCR_LANG:-ru}
      EASYOCR_GPU: ${EASYOCR_GPU:-false}

      ENABLE_CLIP: ${ENABLE_CLIP:-true}
      CLIP_RUN_ON_TEXT_IMAGES: ${CLIP_RUN_ON_TEXT_IMAGES:-false}
      CLIP_MODEL: ${CLIP_MODEL:-ViT-B-32}
      CLIP_PRETRAINED: ${CLIP_PRETRAINED:-openai}
      CLIP_MIN_CONFIDENCE: ${CLIP_MIN_CONFIDENCE:-0.58}
      CLIP_TOP_K: ${CLIP_TOP_K:-10}

      ENABLE_VLM: ${ENABLE_VLM:-false}
      VLM_MODEL: ${VLM_MODEL:-llava:7b}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}

      XDG_CACHE_HOME: /models/.cache
      HF_HUB_CACHE: /models/huggingface/hub
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
      TIKTOKEN_CACHE_DIR: /models/tiktoken
      EASYOCR_MODULE_PATH: /models/easyocr
      PADDLE_HOME: /models/paddle
      YOLO_CONFIG_DIR: /models/ultralytics
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - analysis_model_cache:/models
      - analysis_debug:/tmp/smart-gallery-analysis-debug
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health/live"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s

  server:
    build: .
    container_name: photo-server
    restart: unless-stopped
    networks:
      - gallery-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      analysis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/photo_cloud
      SPRING_DATASOURCE_USERNAME: photo_user
      SPRING_DATASOURCE_PASSWORD: photo_password
      APP_STORAGE_PROVIDER: minio
      APP_STORAGE_BUCKET: smart-gallery-media
      APP_STORAGE_MINIO_ENDPOINT: http://minio:9000
      APP_STORAGE_MINIO_ACCESS_KEY: minio
      APP_STORAGE_MINIO_SECRET_KEY: minio123
      APP_ANALYSIS_ENABLED: "true"
      APP_ANALYSIS_BASE_URL: http://analysis:8090
      APP_CORS_ALLOWED_ORIGIN_LOCALHOST: ${APP_CORS_ALLOWED_ORIGIN_LOCALHOST:-http://localhost:5173}
      APP_CORS_ALLOWED_ORIGIN_LOOPBACK: ${APP_CORS_ALLOWED_ORIGIN_LOOPBACK:-http://127.0.0.1:5173}
      APP_CORS_ALLOWED_ORIGIN_PATTERN_1: ${APP_CORS_ALLOWED_ORIGIN_PATTERN_1:-}
      APP_CORS_ALLOWED_ORIGIN_PATTERN_2: ${APP_CORS_ALLOWED_ORIGIN_PATTERN_2:-}
      APP_MEDIA_DOWNLOAD_TOKEN_EXPIRATION_MS: ${APP_MEDIA_DOWNLOAD_TOKEN_EXPIRATION_MS:-900000}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-change-this-secret-change-this-secret}
    ports:
      - "8081:8080"

volumes:
  postgres_data_v3:
  minio_data_v3:
  analysis_model_cache:
  analysis_debug:

networks:
  gallery-backend:
    name: smart-gallery-network
